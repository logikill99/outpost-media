# /etc/dnsmasq.conf — Outpost DHCP + DNS
# Resolves ALL DNS to the Pi (10.0.0.1) so any browser request lands on us.
interface=wlan0
bind-interfaces

# DHCP — hand out 25 leases on the 10.0.0.0/24 subnet
dhcp-range=10.0.0.10,10.0.0.30,255.255.255.0,24h
dhcp-lease-max=25
dhcp-option=option:router,10.0.0.1
dhcp-option=option:dns-server,10.0.0.1

# DNS — wildcard resolve everything to 10.0.0.1
address=/#/10.0.0.1

# Don't forward .local queries upstream (mDNS clobber)
server=/local/
domain=local
local=/local/

# No upstream DNS (we are entirely offline)
no-resolv
no-poll

log-queries
log-facility=/var/log/dnsmasq.log
