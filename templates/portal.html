<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Outpost</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;align-items:center;justify-content:center;padding:20px;line-height:1.4}
.card{max-width:380px;width:100%;background:#111;border:1px solid #222;border-top:4px solid #e10600;border-radius:8px;padding:28px;text-align:center}
h1{font-size:22px;color:#e10600;margin-bottom:6px;letter-spacing:.5px}
p.sub{color:#aaa;font-size:14px;margin-bottom:22px}
a.btn{display:block;background:#e10600;color:#fff;text-decoration:none;padding:14px 18px;border-radius:6px;font-weight:700;font-size:16px;letter-spacing:.5px}
a.btn:active{background:#b80500}
.foot{margin-top:18px;color:#777;font-size:12px}
.foot b{color:#ff8700}
</style>
</head>
<body>
<div class="card">
<h1>🏎️ OUTPOST</h1>
<p class="sub">Offline content server — no cell service needed</p>
<a class="btn" href="http://10.0.0.1/">Open Outpost →</a>
<p class="foot">Movies · Games · F1 · CTF · Chat<br><b>No internet required</b></p>
</div>
</body>
</html>
